<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about-me</title>
    <link rel="stylesheet" href="../tool/reset.css" />

    <style>
      p {
        line-height: 30px;
      }
      h1 {
        font-size: 30px;
      }
      body {
        background-color: #171717;
        height: 100vh;
        width: 100vw;
        color: wheat;
        font-family: "Dongle", sans-serif;
        overflow: hidden;
        position: relative; /* 부모 요소에 상대적 위치 설정 */
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        opacity: 0;
        transform: translateY(50px);
        animation: fadeInUp 0.6s forwards;
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .folder {
        border: 1px solid #ccc;
        margin: 10px 0;
        border-radius: 5px;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.6s forwards;
        animation-delay: calc(0.2s * var(--i));
        --i: 0;
      }

      .folder-title {
        background: #171717;
        padding: 10px;
        cursor: pointer;
      }

      .folder-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        background: rgb(79, 77, 77);
        padding: 0 10px;
      }

      .folder-content.show {
        max-height: 200px;
        padding: 10px;
      }

      @media (max-width: 600px) {
        .container {
          padding: 10px;
        }

        .folder-title {
          font-size: 1.2em;
        }

        .search-input {
          font-size: 16px;
        }

        .button {
          font-size: 16px;
        }
      }

      .search-container {
        display: flex;
        align-items: center;
      }

      .search-input {
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-right: 10px;
        flex-grow: 1;
      }

      .button {
        color: wheat;
        padding: 5px 10px;
        border: none;
        border-radius: 5px;
        background: #443e3e;
        cursor: pointer;
        width: 100px;
        margin-left: 10px;
        font-family: "Dongle", sans-serif;
        overflow: hidden;
        font-size: 16px;
      }

      /* Scroll to Top Button 스타일 */
      .scroll-to-top {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #443e3e;
        color: white;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 24px;
        cursor: pointer;
        display: block; /* 항상 표시 */
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 style="animation-delay: 0.3s; animation: fadeInUp 0.6s forwards">
          about-me
        </h1>
        <div class="search-container">
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="검색"
            onkeydown="if (event.key === 'Enter') searchText()"
          />
          <button class="button" onclick="searchText()">enter</button>
          <button class="button" onclick="resetPage()">refresh</button>
        </div>
      </div>

      <!-- 폴더 내용 -->
      <div class="folder" style="--i: 1">
        <div class="folder-title" onclick="toggleContent('folder1')">
          A while ago
        </div>
        <div class="folder-content" id="folder1">
          <p>신규직군에 맞는 포폴등으로 수정 요망</p>
          <iframe src="./yw_R.pdf" width="100%" height="600px"></iframe>
        </div>
      </div>
      <div class="folder" style="--i: 2">
        <div class="folder-title" onclick="toggleContent('folder2')">
          Thoughts on it
        </div>
        <div class="folder-content" id="folder2">
          <p>이커머스 back단 올라운더</p>
          <p>개인정보,인사관련등에 대한 강박</p>
          <p>업무관련 개선에 대한 집착</p>
          <p>기능 구현에 대한 갈망</p>
          <p>스트레스 내성 +++</p>
        </div>
      </div>
      <div class="folder" style="--i: 3">
        <div class="folder-title" onclick="toggleContent('folder3')">
          Things to do
        </div>
        <div class="folder-content" id="folder3">
          <p>javascript</p>
          <p>javascript활용 게임,3d 제작</p>
          <p>이커머스에서 사용할만한 아이템 구상</p>
        </div>
      </div>
    </div>

    <!-- 스크롤 최상단 이동 버튼 -->
    <button class="scroll-to-top" id="scrollToTopBtn" onclick="scrollToTop()">
      ↑
    </button>

    <script>
      function toggleContent(contentId) {
        const content = document.getElementById(contentId);
        content.classList.toggle("show");

        if (content.classList.contains("show")) {
          content.style.maxHeight = content.scrollHeight + "px";
        } else {
          content.style.maxHeight = "0";
        }
      }

      function searchText() {
        const input = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim()
          .replace(/\s+/g, ""); // 공백 제거
        const folders = document.querySelectorAll(".folder");
        let found = false;

        folders.forEach((folder) => {
          const title = folder
            .querySelector(".folder-title")
            .textContent.toLowerCase()
            .replace(/\s+/g, ""); // 공백 제거
          const content = folder
            .querySelector(".folder-content")
            .textContent.toLowerCase()
            .replace(/\s+/g, ""); // 공백 제거

          if (title.includes(input) || content.includes(input)) {
            folder.style.display = "block"; // 검색 결과를 표시
            found = true;

            // 스크롤을 해당 폴더로 이동
            folder.scrollIntoView({ behavior: "smooth" });
          } else {
            folder.style.display = "none"; // 검색 결과가 아닌 경우 숨김
          }
        });

        if (!found) {
          alert("검색 결과가 없습니다.");
        }
      }

      function resetPage() {
        location.reload(); // 페이지 새로 고침
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      document.querySelectorAll(".folder").forEach((folder, index) => {
        folder.style.setProperty("--i", index + 1);
        folder.style.animationDelay = `${0.2 * (index + 1)}s`;
      });
    </script>
  </body>
</html>
