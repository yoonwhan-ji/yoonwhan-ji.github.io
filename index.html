<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <a target="_blank" href="./모바일반응웹.html"
      >☞ 랜딩 페이지 구경하기 "CLICK" !!
    </a>
    <title>yoonwhan 테트리스</title>
    <style>
      a {
        border-radius: 20px;
        color: red;
        margin-bottom: 10px;
        color: inherit; /* 부모 요소의 색상을 상속받음 */
        text-decoration: none;
      }
      body {
        background: url("./mitchell-orr-bYYtehpPaeE-unsplash.jpg") no-repeat
          center center fixed;
        background-size: cover;
        color: white;
        font-family: "Arial", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      }

      #gameArea {
        border: 5px solid #444;
        border-radius: 20px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        background: linear-gradient(#1a1a1a, #333);
        padding: 20px;
        position: relative;
      }

      canvas {
        background: #222;
        display: block;
        border-radius: 10px;
      }

      #controls {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      button {
        background-color: #555;
        color: white;
        border: 2px solid #888;
        border-radius: 10px;
        padding: 10px 15px;
        font-size: 16px;
        margin: 0 5px;
        transition: background-color 0.3s, border-color 0.3s;
      }

      button:hover {
        background-color: #777;
        border-color: #aaa;
      }

      #score {
        text-align: center;
        font-size: 24px;
        margin: 10px 0;
      }

      h2,
      p,
      button,
      #score {
        text-align: center;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      }

      a {
        font-size: 17px;
        text-align: center;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(32, 30, 30, 0.7);
      }

      .explosion {
        position: absolute;
        width: 100%;
        height: 12px; /* 폭발의 높이를 20px로 설정 */
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s;
      }

      .explode {
        animation: explode 0.5s forwards;
      }

      @keyframes explode {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }
      #score {
        display: flex;
        flex-direction: column;
        align-items: end;
        margin-right: 15px;
      }
      img {
        z-index: -1;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="gameArea">
      <h2>yoonwhan 테트리스</h2>
      <div id="score">점수:0</div>
      <canvas id="tetris" width="240" height="400"></canvas>
    </div>
    <div id="controls">
      <button id="left">← 왼쪽</button>
      <button id="rotate">↻ 회전</button>
      <button id="right">→ 오른쪽</button>
      <button id="down">↓ 내리기</button>
    </div>
    <script>
      const canvas = document.getElementById("tetris");
      const context = canvas.getContext("2d");

      context.scale(20, 20);
      let board = Array.from({ length: 20 }, () => Array(12).fill(0));
      let player = { pos: { x: 5, y: 0 }, matrix: createPiece() };
      let score = 0;
      let dropInterval = 1000;
      let lastTime = 0;

      function createPiece() {
        const pieces = "ijlostz";
        const type = pieces[Math.floor(Math.random() * pieces.length)];
        switch (type) {
          case "i":
            return [[1, 1, 1, 1]];
          case "j":
            return [
              [0, 2, 0],
              [2, 2, 2],
            ];
          case "l":
            return [
              [3, 0, 0],
              [3, 3, 3],
            ];
          case "o":
            return [
              [4, 4],
              [4, 4],
            ];
          case "s":
            return [
              [0, 5, 5],
              [5, 5, 0],
            ];
          case "z":
            return [
              [6, 6, 0],
              [0, 6, 6],
            ];
          case "t":
            return [
              [0, 7, 0],
              [7, 7, 7],
            ];
        }
      }

      function draw() {
        context.clearRect(0, 0, canvas.width, canvas.height);
        drawMatrix(board, { x: 0, y: 0 });
        drawMatrix(player.matrix, player.pos);
      }

      function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value) {
              context.fillStyle = getColor(value);
              context.fillRect(x + offset.x, y + offset.y, 1, 1);
              context.fillStyle = "rgba(255, 255, 255, 0.2)";
              context.fillRect(
                x + offset.x + 0.2,
                y + offset.y + 0.2,
                0.6,
                0.6
              );
            }
          });
        });
      }

      function getColor(value) {
        switch (value) {
          case 1:
            return "cyan"; // I
          case 2:
            return "blue"; // J
          case 3:
            return "orange"; // L
          case 4:
            return "yellow"; // O
          case 5:
            return "green"; // S
          case 6:
            return "red"; // Z
          case 7:
            return "purple"; // T
          default:
            return "black";
        }
      }

      function collide(board, player) {
        for (let y = 0; y < player.matrix.length; y++) {
          for (let x = 0; x < player.matrix[y].length; x++) {
            if (
              player.matrix[y][x] &&
              (board[y + player.pos.y] &&
                board[y + player.pos.y][x + player.pos.x]) !== 0
            ) {
              return true;
            }
          }
        }
        return false;
      }

      function merge(board, player) {
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value) {
              board[y + player.pos.y][x + player.pos.x] = value;
            }
          });
        });
      }

      function removeRows() {
        outer: for (let y = board.length - 1; y >= 0; y--) {
          if (board[y].every((value) => value !== 0)) {
            explodeRow(y); // 폭발 효과 호출
            board.splice(y, 1);
            board.unshift(Array(12).fill(0));
            score += 10;
            updateScore();
          }
        }
      }

      function explodeRow(y) {
        const explosionDiv = document.createElement("div");
        explosionDiv.className = "explosion";
        explosionDiv.style.top = `${y * 27}px`; // Y 좌표 조정
        explosionDiv.style.left = `0`;
        explosionDiv.style.width = "100%";
        explosionDiv.style.position = "absolute";
        explosionDiv.style.backgroundColor = "rgba(255, 0, 0, 0.5)";
        document.getElementById("gameArea").appendChild(explosionDiv); // 폭발 효과를 게임 영역에 추가

        // 애니메이션 추가
        setTimeout(() => {
          explosionDiv.classList.add("explode");
        }, 0);

        setTimeout(() => {
          explosionDiv.remove();
        }, 500);
      }

      function drop() {
        while (!collide(board, player)) {
          player.pos.y++;
        }
        player.pos.y--;
        merge(board, player);
        removeRows();
        player.matrix = createPiece();
        player.pos.y = 0;
        player.pos.x = 5;
        if (collide(board, player)) {
          alert("게임 오버");
          board = Array.from({ length: 20 }, () => Array(12).fill(0));
          score = 0; // 점수 초기화
          updateScore(); // 점수 업데이트
        }
      }

      function update() {
        if (lastTime >= dropInterval) {
          player.pos.y++;
          if (collide(board, player)) {
            player.pos.y--;
            merge(board, player);
            removeRows();
            player.matrix = createPiece();
            player.pos.y = 0;
            player.pos.x = 5;
            if (collide(board, player)) {
              alert("게임 오버");
              board = Array.from({ length: 20 }, () => Array(12).fill(0));
              score = 0; // 점수 초기화
              updateScore(); // 점수 업데이트
            }
          }
          lastTime = 0;
        }
        lastTime += 1000 / 60;
        draw();
        requestAnimationFrame(update);
      }

      function updateScore() {
        document.getElementById("score").innerText = `점수: ${score}`;
      }

      document.getElementById("left").addEventListener("click", moveLeft);
      document.getElementById("rotate").addEventListener("click", rotatePiece);
      document.getElementById("right").addEventListener("click", moveRight);
      document.getElementById("down").addEventListener("click", moveDown);

      function moveLeft() {
        player.pos.x--;
        if (collide(board, player)) player.pos.x++;
      }

      function rotatePiece() {
        const originalMatrix = player.matrix;
        player.matrix = rotate(player.matrix);
        if (collide(board, player)) player.matrix = originalMatrix;
      }

      function moveRight() {
        player.pos.x++;
        if (collide(board, player)) player.pos.x--;
      }

      function moveDown() {
        player.pos.y++;
        if (collide(board, player)) {
          player.pos.y--;
          merge(board, player);
          removeRows();
          player.matrix = createPiece();
          player.pos.y = 0;
          player.pos.x = 5;
          if (collide(board, player)) {
            alert("게임 오버");
            board = Array.from({ length: 20 }, () => Array(12).fill(0));
            score = 0; // 점수 초기화
            updateScore(); // 점수 업데이트
          }
        }
      }

      function rotate(matrix) {
        return matrix[0].map((_, index) =>
          matrix.map((row) => row[index]).reverse()
        );
      }

      document.addEventListener("keydown", (event) => {
        switch (event.code) {
          case "ArrowLeft":
            moveLeft();
            break;
          case "ArrowRight":
            moveRight();
            break;
          case "ArrowUp":
            rotatePiece();
            break;
          case "ArrowDown":
            moveDown();
            break;
          case "Space":
            drop();
            break;
        }
      });

      update();
    </script>
  </body>
  <p>© 2024 yoonwhan. 모든 권리 보유.</p>
</html>
