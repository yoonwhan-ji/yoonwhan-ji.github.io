<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap"
      rel="stylesheet"
    />
    <title>start page</title>
    <style>
      body {
        margin: 0;
        overflow-y: hidden;
        height: 100vh;
        color: white;
        font-family: Arial, sans-serif;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      body::-webkit-scrollbar {
        display: none;
      }

      .video-container {
        position: relative;
        width: 100%;
        height: 300vh;
      }

      .video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      .video.active {
        opacity: 1;
      }

      .indicator {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px;
        font-size: 10px;
      }

      .scroll-progress {
        position: fixed;
        top: 50%;
        right: 20px;
        width: 15px;
        height: 700px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 50px;
        transform: translateY(-50%);
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: flex-end;
      }

      .scroll-fill {
        border-radius: 50px;
        width: 100%;
        height: 100%; /* Start with 100% height */
        background: transparent; /* Transparent background */
        border: 4px solid rgba(255, 255, 255, 0.5); /* White light border */
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Soft white glow */
        transition: height 1s ease; /* Smooth height transition */
      }

      .video-text {
        font-family: "Zen Dots", sans-serif;
        font-weight: 400;
        position: absolute;
        font-size: 20px;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        z-index: 10;
        opacity: 0;
        transform: translateX(-100%);
        transition: opacity 1s ease-in-out, transform 1s ease-in-out;
      }

      .video-text.active {
        opacity: 1;
        transform: translateX(0);
      }

      /* Individual text positions */
      #text1 {
        top: 5%;
        left: 5%;
        font-size: 40px;
      }
      #text2 {
        top: 15%;
        left: 5%;
        font-size: 40px;
      }
      #text3 {
        top: 25%;
        left: 5;
        font-size: 40px;
      }

      @media (min-width: 600px) {
        .video-text {
          font-size: 30px;
        }
        #text1 {
          left: 10%;
        }
        #text2 {
          left: 30%;
        }
        #text3 {
          left: 40%;
        }
      }

      .footer {
        height: 10%;
        background-color: rgba(49, 49, 49, 0.8);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        bottom: 0;
        width: 100%;
        opacity: 0;
        transition: opacity 2s ease-in-out;
        pointer-events: none;
        font-size: 10px;
        justify-content: space-evenly;
        font-family: "Zen Dots", sans-serif;
        font-weight: 400;
      }

      .footer.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="video-container">
      <video
        id="video1"
        class="video active"
        src="./빛나는지구.mp4"
        autoplay
        muted
        loop
      ></video>
      <video
        id="video2"
        class="video"
        src="./우주선이륙.mp4"
        autoplay
        muted
        loop
      ></video>
      <video
        id="video3"
        class="video"
        src="./end.mp4"
        autoplay
        muted
        loop
      ></video>
      <div class="indicator" id="videoIndicator">1</div>
      <div class="scroll-progress">
        <div class="scroll-fill" id="scrollFill"></div>
      </div>

      <div class="video-text" id="text1">
        Have you ever thought about leaving the Earth?
      </div>
      <div class="video-text" id="text2">
        This is your life chance to change everything.
      </div>
      <div class="video-text" id="text3">
        Take your opportunity, We will join you.
      </div>
    </div>
    <footer class="footer" id="footer">
      <div class="footer-logo"><img src="./logo.png" alt="" /></div>
      <div class="footer-txt">
        <p>
          ADDRESS : 서울 강남구 강남대로 324 역삼 디오슈페리움 2 층
          모두의연구소.
        </p>
        <p>CONTACT : 010-0000-0000.</p>
        <p>E-MAIL : ZERO-MILEAGE@gmail.com.</p>
      </div>
    </footer>
    <script>
      const videos = document.querySelectorAll(".video");
      const texts = document.querySelectorAll(".video-text");
      const indicator = document.getElementById("videoIndicator");
      const scrollFill = document.getElementById("scrollFill");
      const footer = document.getElementById("footer");
      let currentVideo = 0;
      let wheelCount = 0;

      function updateIndicator() {
        indicator.textContent = currentVideo + 1;
        scrollFill.style.height =
          ((videos.length - currentVideo - 1) / (videos.length - 1)) * 100 +
          "%"; // Adjust to count down
        footer.classList.toggle("active", currentVideo === 2);
      }

      window.addEventListener("wheel", (event) => {
        event.preventDefault();
        wheelCount++;

        if (wheelCount >= 5) {
          handleScroll(event.deltaY);
          wheelCount = 0;
        }
      });

      let touchStartY = 0;
      window.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0].clientY;
      });

      window.addEventListener("touchmove", (event) => {
        const touchEndY = event.touches[0].clientY;
        const deltaY = touchStartY - touchEndY;
        handleScroll(deltaY);
      });

      function handleScroll(deltaY) {
        if (deltaY > 50 && currentVideo < videos.length - 1) {
          currentVideo++;
        } else if (deltaY < -50 && currentVideo > 0) {
          currentVideo--;
        }
        updateVideosAndTexts();
      }

      function updateVideosAndTexts() {
        updateIndicator();
        videos.forEach((video, index) => {
          video.classList.toggle("active", index === currentVideo);
        });
        texts.forEach((text, index) => {
          text.classList.toggle("active", index === currentVideo);
        });
      }

      texts[currentVideo].classList.add("active");
      updateIndicator();
    </script>
  </body>
</html>
