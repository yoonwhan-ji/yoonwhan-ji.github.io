<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>프로젝트 관리 및 댓글 시스템</title>
        <style>
            /* 기존 CSS 스타일 유지 */
            body {
                font-family: "Arial", sans-serif;
                background-color: #f4f4f9;
                color: #333;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            header {
                background-color: #4caf50;
                color: white;
                text-align: center;
                padding: 20px;
                font-size: 24px;
            }

            .container {
                width: 80%;
                margin: 20px auto;
                background-color: white;
                padding: 20px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                border-radius: 8px;
            }

            h2 {
                font-size: 1.8em;
                color: #4caf50;
                margin-bottom: 20px;
            }

            .comment-section,
            .progress-section {
                margin-bottom: 30px;
            }

            textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-size: 16px;
                margin-bottom: 10px;
                resize: vertical;
            }

            button {
                background-color: #4caf50;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            button:hover {
                background-color: #45a049;
            }

            #commentList {
                list-style-type: none;
                padding: 0;
            }

            #commentList li {
                background-color: #f9f9f9;
                margin: 10px 0;
                padding: 10px;
                border-radius: 5px;
                border: 1px solid #ddd;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            #commentList li button {
                background-color: #f44336;
                color: white;
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
            }

            .project-container {
                margin-top: 20px;
            }

            .project {
                margin-bottom: 20px;
            }

            .project-name {
                font-weight: bold;
                margin-bottom: 10px;
            }

            .task-list {
                list-style-type: none;
                padding: 0;
            }

            .task-item {
                margin: 5px 0;
            }

            .progress-bar-container {
                margin-top: 10px;
            }

            .progress-bar {
                width: 100%;
                background-color: #e0e0e0;
                border-radius: 20px;
                height: 20px;
                margin-top: 10px;
            }

            .progress-bar span {
                display: block;
                height: 100%;
                background-color: #4caf50;
                border-radius: 20px;
            }

            .task-item button {
                background-color: #f44336;
                color: white;
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                margin-left: 10px;
            }

            .reset-btn {
                background-color: #f44336;
                color: white;
                padding: 10px 20px;
                font-size: 16px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 20px;
                display: block;
                width: 100%;
            }

            .reset-btn:hover {
                background-color: #d32f2f;
            }

            /* 비밀번호 입력화면 스타일 */
            #passwordPrompt {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.5);
                position: fixed;
                width: 100%;
                top: 0;
            }

            #passwordPrompt input {
                padding: 10px;
                font-size: 16px;
                margin-bottom: 20px;
                border: 1px solid #ddd;
                border-radius: 5px;
            }

            #passwordPrompt button {
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 5px;
                background-color: #4caf50;
                color: white;
                border: none;
            }
        </style>
    </head>
    <body>
        <!-- 비밀번호 입력 창 -->
        <div id="passwordPrompt">
            <input
                type="password"
                id="passwordInput"
                placeholder="비밀번호를 입력하세요"
            />
            <button onclick="checkPassword()">로그인</button>
        </div>

        <!-- 실제 페이지 내용 -->
        <div id="mainContent" style="display: none">
            <header>프로젝트 관리 및 댓글 시스템</header>
            <div class="container">
                <!-- 프로젝트 진척률 섹션 -->
                <div class="progress-section">
                    <h2>프로젝트 진척률</h2>
                    <input
                        type="text"
                        id="projectInput"
                        placeholder="새 프로젝트 추가..."
                    />
                    <button onclick="addProject()">프로젝트 추가</button>

                    <div class="project-container" id="projects"></div>

                    <div class="progress-bar-container">
                        <h3>
                            전체 진척률: <span id="progressPercentage">0%</span>
                        </h3>
                        <div class="progress-bar">
                            <span id="progressBar" style="width: 0%"></span>
                        </div>
                    </div>
                </div>

                <!-- 댓글 작성 섹션 -->
                <div class="comment-section">
                    <h2>특이사항 및 댓글</h2>
                    <textarea
                        id="commentInput"
                        placeholder="댓글을 입력하세요..."
                    ></textarea>
                    <button onclick="addComment()">댓글 추가</button>
                    <h3>댓글 목록</h3>
                    <ul id="commentList"></ul>
                </div>

                <!-- 초기화 버튼 -->
                <button class="reset-btn" onclick="resetData()">
                    데이터 초기화
                </button>
            </div>
        </div>

        <script>
            const correctPassword = "1234"; // 비밀번호 설정
            const repoOwner = "your-username"; // GitHub 사용자명
            const repoName = "your-repository"; // GitHub 저장소명
            const commentsFile = "comments.json";
            const projectsFile = "projects.json";

            const token = "your-github-token"; // GitHub Personal Access Token (수정 필요)

            // 비밀번호 체크
            function checkPassword() {
                const passwordInput =
                    document.getElementById("passwordInput").value;
                if (passwordInput === correctPassword) {
                    document.getElementById("passwordPrompt").style.display =
                        "none";
                    document.getElementById("mainContent").style.display =
                        "block";
                } else {
                    alert("비밀번호가 틀렸습니다. 다시 시도하세요.");
                }
            }

            // 댓글 추가
            function addComment() {
                const commentInput = document.getElementById("commentInput");
                const comment = commentInput.value.trim();
                if (comment !== "") {
                    fetch(
                        `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                        {
                            method: "GET",
                            headers: {
                                Authorization: `token ${token}`,
                            },
                        }
                    )
                        .then((response) => response.json())
                        .then((data) => {
                            let comments = [];
                            if (data.content) {
                                comments = JSON.parse(atob(data.content)); // base64로 인코딩된 내용
                            }
                            comments.push({
                                user: "Anonymous",
                                comment: comment,
                            });
                            const encodedData = btoa(JSON.stringify(comments)); // base64로 인코딩
                            return fetch(
                                `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `token ${token}`,
                                    },
                                    body: JSON.stringify({
                                        message: "Add comment",
                                        content: encodedData,
                                    }),
                                }
                            );
                        })
                        .then(() => {
                            displayComments();
                        });
                }
                commentInput.value = "";
            }

            function displayComments() {
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                    {
                        method: "GET",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                    }
                )
                    .then((response) => response.json())
                    .then((data) => {
                        const commentList =
                            document.getElementById("commentList");
                        commentList.innerHTML = "";
                        const comments = data.content
                            ? JSON.parse(atob(data.content))
                            : [];
                        comments.forEach((comment, index) => {
                            const li = document.createElement("li");
                            li.textContent = comment.comment;
                            const deleteButton =
                                document.createElement("button");
                            deleteButton.textContent = "X";
                            deleteButton.onclick = function () {
                                deleteComment(index);
                            };
                            li.appendChild(deleteButton);
                            commentList.appendChild(li);
                        });
                    });
            }

            // 댓글 삭제
            function deleteComment(index) {
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                    {
                        method: "GET",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                    }
                )
                    .then((response) => response.json())
                    .then((data) => {
                        let comments = [];
                        if (data.content) {
                            comments = JSON.parse(atob(data.content));
                        }
                        comments.splice(index, 1); // 댓글 삭제
                        const encodedData = btoa(JSON.stringify(comments)); // base64로 인코딩
                        return fetch(
                            `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                            {
                                method: "PUT",
                                headers: {
                                    Authorization: `token ${token}`,
                                },
                                body: JSON.stringify({
                                    message: "Delete comment",
                                    content: encodedData,
                                }),
                            }
                        );
                    })
                    .then(() => {
                        displayComments();
                    });
            }

            // 프로젝트 관리 기능
            let projects = [];
            function addProject() {
                const projectInput = document.getElementById("projectInput");
                const projectName = projectInput.value.trim();
                if (projectName !== "") {
                    const newProject = {
                        name: projectName,
                        tasks: [{ name: "Finished", completed: false }],
                    };
                    projects.push(newProject);
                    projectInput.value = "";
                    saveProjects();
                    displayProjects();
                    updateOverallProgress();
                }
            }

            function saveProjects() {
                const encodedData = btoa(JSON.stringify(projects));
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${projectsFile}`,
                    {
                        method: "PUT",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                        body: JSON.stringify({
                            message: "Add project",
                            content: encodedData,
                        }),
                    }
                );
            }

            function displayProjects() {
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${projectsFile}`,
                    {
                        method: "GET",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                    }
                )
                    .then((response) => response.json())
                    .then((data) => {
                        const projectContainer =
                            document.getElementById("projects");
                        projectContainer.innerHTML = "";
                        const loadedProjects = data.content
                            ? JSON.parse(atob(data.content))
                            : [];
                        loadedProjects.forEach((project, index) => {
                            const projectDiv = document.createElement("div");
                            projectDiv.classList.add("project");
                            projectDiv.innerHTML = `<div class="project-name">${project.name}</div>`;

                            project.tasks.forEach((task, taskIndex) => {
                                const checkbox =
                                    document.createElement("input");
                                checkbox.type = "checkbox";
                                checkbox.checked = task.completed;
                                checkbox.onclick = function () {
                                    task.completed = checkbox.checked;
                                    saveProjects();
                                    updateOverallProgress();
                                };

                                const taskLabel =
                                    document.createElement("label");
                                taskLabel.classList.add("task-item");
                                taskLabel.appendChild(checkbox);
                                taskLabel.appendChild(
                                    document.createTextNode(task.name)
                                );

                                const deleteButton =
                                    document.createElement("button");
                                deleteButton.textContent = "X";
                                deleteButton.onclick = function () {
                                    deleteTask(index, taskIndex);
                                };

                                taskLabel.appendChild(deleteButton);
                                projectDiv.appendChild(taskLabel);
                            });

                            projectContainer.appendChild(projectDiv);
                        });
                    });
            }

            function deleteTask(projectIndex, taskIndex) {
                projects[projectIndex].tasks.splice(taskIndex, 1);
                saveProjects();
                displayProjects();
                updateOverallProgress();
            }

            function updateOverallProgress() {
                let totalTasks = 0;
                let completedTasks = 0;
                projects.forEach((project) => {
                    project.tasks.forEach((task) => {
                        totalTasks++;
                        if (task.completed) completedTasks++;
                    });
                });
                const progress =
                    totalTasks > 0
                        ? Math.round((completedTasks / totalTasks) * 100)
                        : 0;
                document.getElementById(
                    "progressPercentage"
                ).textContent = `${progress}%`;
                document.getElementById(
                    "progressBar"
                ).style.width = `${progress}%`;
            }

            function resetData() {
                // GitHub API로 초기화
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${projectsFile}`,
                    {
                        method: "PUT",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                        body: JSON.stringify({
                            message: "Reset projects",
                            content: btoa("[]"),
                        }),
                    }
                );
                fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${commentsFile}`,
                    {
                        method: "PUT",
                        headers: {
                            Authorization: `token ${token}`,
                        },
                        body: JSON.stringify({
                            message: "Reset comments",
                            content: btoa("[]"),
                        }),
                    }
                );
                projects = [];
                displayProjects();
                displayComments();
                updateOverallProgress();
            }

            // 페이지 로드 시 기능
            window.onload = function () {
                displayComments();
                displayProjects();
            };
        </script>
    </body>
</html>
