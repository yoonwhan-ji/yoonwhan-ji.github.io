<!DOCTYPE html>

  <head>

    <title>yoonwhan_hello world</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #eaeaea;
        color: #333;
      }
      header {
        background: linear-gradient(135deg, #6e8efb, #a777e3);
        color: white;
        padding: 20px;
        text-align: center;
        border-bottom: 5px solid #5b6fd3;
      }
      nav {
        margin: 15px 0;
      }
      nav a {
        margin: 0 15px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s;
      }
      nav a:hover {
        color: #ffd700;
      }
      section {
        padding: 20px;
        margin: 15px 10px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin-top: 0;
        color: #6e8efb;
      }
      footer {
        text-align: center;
        padding: 20px;
        background-color: #6e8efb;
        color: white;
        position: relative;
        bottom: 0;
        width: 100%;
        border-top: 5px solid #5b6fd3;
      }
      @media (max-width: 768px) {
        nav {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        nav a {
          margin: 10px 0;
        }
      }
      iframe {
        width: auto;
        height: 80px;
        border-radius: 20px;
        border: 1px solid black;
      }
