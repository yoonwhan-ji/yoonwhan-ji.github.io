<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Three.js 기하학적 도형</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      canvas {
        display: block;
      }
      .controls {
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>
        카메라 Z 위치:
        <input
          type="range"
          id="cameraZ"
          min="1"
          max="10"
          step="0.1"
          value="5"
        />
      </label>
      <br />
      <label>
        도형 선택:
        <select id="shapeSelect">
          <option value="cube">정육면체</option>
          <option value="cylinder">원기둥</option>
          <option value="pyramid">피라미드</option>
        </select>
      </label>
      <br />
      <label>
        도형 크기:
        <input
          type="range"
          id="shapeSize"
          min="1"
          max="5"
          step="0.1"
          value="2"
        />
      </label>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      const renderer = new THREE.WebGLRenderer();

      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      let shape; // 현재 도형을 저장할 변수

      function createShape(type, size) {
        if (shape) {
          scene.remove(shape);
          shape.geometry.dispose();
        }

        let geometry;
        switch (type) {
          case "cube":
            geometry = new THREE.BoxGeometry(size, size, size);
            break;
          case "cylinder":
            geometry = new THREE.CylinderGeometry(size, size, size * 2, 32);
            break;
          case "pyramid":
            geometry = new THREE.ConeGeometry(size, size * 2, 4); // 정사면체
            break;
        }

        const material = new THREE.MeshStandardMaterial({
          color: Math.random() * 0xffffff,
        });
        shape = new THREE.Mesh(geometry, material);
        scene.add(shape);
      }

      // 초기 도형 생성
      createShape("cube", 2);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 5, 5).normalize();
      scene.add(light);

      camera.position.z = 5;

      document.getElementById("cameraZ").addEventListener("input", (event) => {
        camera.position.z = event.target.value;
      });

      document
        .getElementById("shapeSelect")
        .addEventListener("change", (event) => {
          const selectedShape = event.target.value;
          const size = document.getElementById("shapeSize").value;
          createShape(selectedShape, size);
        });

      document
        .getElementById("shapeSize")
        .addEventListener("input", (event) => {
          const size = event.target.value;
          const selectedShape = document.getElementById("shapeSelect").value;
          createShape(selectedShape, size);
        });

      function animate() {
        requestAnimationFrame(animate);
        if (shape) {
          shape.rotation.x == 0.01;
          shape.rotation.y += 0.01;
        }
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
